# Parameters for generating radio or xray emission

# 0=none (doesn't really work), 1=adiabatic, 2=adiabatic+synch, 3=adiabatic+ic, 4=full
# 5=synch, 6=IC, 7=radiative
# for the moment, only enter a single loss value
losses: [4] 
#[1, 4, 5, 6, 7]

# these are safe defaults for the electron energy distribution (see Yates-Jones+2021)
gmin: 500
gmax: 1.0e+5
s: 2.2

# a safe default value for ratio of thermal energy to magnetic energy
eta: 0.03

# the default last shock time index is 1
lst_index: 2

# either angular or physical, whether pixel size and beam FWHM are in angular coordinates or kpc
observing_property_units: physical

# by default, source is oriented in X-Z plane, integration along Y
angle: 0.0
rotation_axes: Z

# particle sampling (in Myr)
particle_sampling: 0.01

# tracer cutoff - see anyones jet sim paper.. commonly used. 
tracer_cutoff: 0.0001 

# A default telescope collecting area of x-ray observations
tscope_collecting_area_m2: 0.15

# cut emissivites based on velocity (set rejects to 0)
# in units of c (if < 1) or lorentz factor (if > 1)
# postive means take everything above this velocity, while
# negative means take everything below this velocity
# a value of 0 disables the velocity cut
velocity_cut: 0

